<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">    
    <title>Riwayat</title>
</head>
<body>
    <div class="header">
        <div class="title-wrapper"
            style="display:flex; align-items:center; gap:10px; height:50px;">
            
            <img src="src/assets/logo_polkstj.png"
                style="width:50px; height:50px; object-fit:contain; display:block;">

            <span class="title"
                style="display:flex; align-items:center; height:50px; line-height:1; margin:0;">
                History Temperature Ban
            </span>
        </div>
        <div class="header-actions">
            <button id="history-btn" onclick="window.location.href='index.html'">Home</button>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="history-actions">
        <button id="export-btn" class="btn btn-primary">Export to Excel</button>
        <button id="delete-all-btn" class="btn btn-danger">Delete All Data</button>
    </div>

    <table id="history-table" border="1">
        <thead>
            <tr>
                <th>FL</th>
                <th>Battery FL</th>
                <th>Status FL</th>
                <th>FR</th>
                <th>Battery FR</th>
                <th>Status FR</th>
                <th>RL</th>
                <th>Battery RL</th>
                <th>Status RL</th>
                <th>RR</th>
                <th>Battery RR</th>
                <th>Status RR</th>
                <th>Speed</th>
                <th>Satelite</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="src/js/config.js"></script>
    <script src="src/js/history.js"></script>
</body>
</html>
