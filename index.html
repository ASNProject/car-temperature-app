<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Ban</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="header">
        <div class="title-wrapper"
            style="display:flex; align-items:center; gap:10px; height:50px;">
            
            <img src="src/assets/logo_polkstj.png"
                style="width:50px; height:50px; object-fit:contain; display:block;">

            <span class="title"
                style="display:flex; align-items:center; height:50px; line-height:1; margin:0;">
                Monitoring Tire Temperature 
            </span>
        </div>
        <div class="header-actions">
            <button id="history-btn" onclick="window.location.href='history.html'">History</button>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>
    <div class="content-container">
        <div class="info-panel">
            <div class="road-container">
                <div class="center-line"></div>
                <div class="car-container">
                    <img src="src/assets/truck.png" alt="Truck" class="car-image">
                    <div class="pressure-box fl">
                        <span>Temperature FL</span>
                    </div>
                    <div class="pressure-box fr-text-mismatch">
                        <span>Temperature RL</span>
                    </div>
                    <div class="pressure-box rl">
                        <span>Temperature RL</span>
                    </div>
                    <div class="pressure-box rr">
                        <span>Temperature RR</span>
                    </div>

                    <div class="battery-box fl-battery">
                        <span></span>
                    </div>
                    <div class="battery-box fr-battery">
                        <span></span>
                    </div>
                    <div class="battery-box rl-battery">
                        <span></span>
                    </div>
                    <div class="battery-box rr-battery">
                        <span></span>
                    </div>

                    <div class="status-box fl-status">
                        <span></span>
                    </div>
                    <div class="status-box fr-status">
                        <span></span>
                    </div>
                    <div class="status-box rl-status">
                        <span></span>
                    </div>
                    <div class="status-box rr-status">
                        <span></span>
                    </div>
                </div>
                <div class="road-edge left-edge"></div>
                <div class="road-edge right-edge"></div> 
                <!-- Speed Box -->
                <div class="speed-box">
                    <button class="map-btn" onclick="openMaps()">
                        Open Maps
                    </button>
                    <div class="speed-table">
                        <div class="speed-title">Speed</div>
                        <div class="speed-value">
                            <span class="speed-number"></span>
                            <span class="speed-unit">Km/H</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="src/js/config.js"></script>
    <script src="src/js/script.js"></script>
    <script src="src/js//auth.js"></script>
    <script>
        checkAuth();
    </script>
</body>
</html>
